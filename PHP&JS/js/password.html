<html>
<head>
<title>Password validation</title>
</head>
<body>
<h1>Password validation</h1>
   Password: <input type="text" id="pass"><br>
   Confirm Password: <input type="password" id="confirm"><br>
   <input type="submit" onclick="verify()">
   <p id="txt"></p>
   <script>
   function verify(){
       document.getElementById("txt").innerHTML = "";        
             if (document.getElementById("pass").value != document.getElementById("confirm").value) {
           document.getElementById("txt").innerHTML = "Password and confirm password must be the same.";
       }
           else if (document.getElementById("pass").value.length < 8) {
           document.getElementById("txt").innerHTML = "Password must be greater than 8 characters.";
       }
   }
   </script>
</body>
</html>
