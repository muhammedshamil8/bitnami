<!DOCTYPE html>
<html>
<head>
    <title>Number Type Checker</title>
    <script language="javascript">
        function numtype() {
            var n = parseInt(document.fi.ti.value);
            var i = 1;
            var s = 0;

            while (i < n) {
                if (n % i === 0) {
                    s += i; 
                }
                i++;             }

              if (s === n) {
                alert("The given number is perfect");
            } else if (s < n) {
                alert("The given number is deficient");
            } else {
                alert("The given number is abundant");
            }
        }
    </script>
</head>
<body>
    <form name="fi">
        Enter the number: <input type="text" name="ti"><br><br>
        <input type="button" value="Display" onclick="numtype()">
    </form>
</body>
</html>
