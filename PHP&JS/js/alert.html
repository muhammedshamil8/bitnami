<!DOCTYPE html>
<html >
<head>
    
    <title>Sum of Array Elements</title>
    <script>
        function arraysum() {
            var a = [];
            var n = parseInt(document.fi.t1.value);
            var s = 0;
            
            for (var i = 0; i < n; i++) {
                
                a[i] = parseInt(prompt("Enter an element"));
                s += a[i];             }
            
            alert("Sum is " + s);
        }
    </script>
</head>
<body>
    <form name="fi">
        Enter the limit: <input type="text" name="t1">
        <input type="button" value="Sum" onclick="arraysum()">
    </form>
</body>
</html>
